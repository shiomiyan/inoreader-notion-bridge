name: Dependabot auto-merge

on:
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    name: Dependabot Auto Merge
    timeout-minutes: 10
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'shiomiyan/inoreader-notion-bridge' &&
      github.event.pull_request.draft == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark supported npm updates for post-CI merge
        if: |
          (
            steps.metadata.outputs.package-ecosystem == 'npm' ||
            steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
          ) &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
            steps.metadata.outputs.update-type == 'version-update:semver-patch'
          )
        env:
          # Use the ephemeral workflow token only. Do not use a PAT here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge "$PR_URL"
